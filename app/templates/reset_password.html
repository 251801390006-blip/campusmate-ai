{% extends "base.html" %}

{% block title %}Reset Password - CampusMate AI{% endblock %}

{% block content %}
<div class="container py-5 d-flex justify-content-center">
    <div class="flat-card auth-card" style="width: 100%; max-width: 420px; padding: 2.5rem 2rem 2rem;">
        <div class="text-center mb-4">
            <div class="auth-logo-icon">
                <i class="fa-solid fa-lock-open"></i>
            </div>
            <h2 class="h4 mb-1" style="font-weight: 700; letter-spacing: -0.02em;">Set New Password</h2>
            <p class="text-secondary" style="font-size: 0.82rem;">Enter your email verification key and set your new credentials</p>
        </div>

        <form method="POST" action="{{ url_for('auth.reset_password') }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            
            <div class="input-group mb-3">
                <label for="email-field" class="fw-semibold mb-1" style="font-size: 0.82rem;">Email Address</label>
                <input type="email" id="email-field" name="email" class="form-control" placeholder="name@university.edu" required style="width:100%; padding:8px; border-radius:4px; border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
            </div>

            <div class="input-group mb-3">
                <label for="password-field" class="fw-semibold mb-1" style="font-size: 0.82rem;">New Secure Password</label>
                <input type="password" id="password-field" name="password" class="form-control" placeholder="At least 8 characters" required style="width:100%; padding:8px; border-radius:4px; border:1px solid var(--border-color); background:var(--bg-primary); color:var(--text-primary);">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Confirm Reset <i class="fa-solid fa-circle-check ms-1"></i></button>
        </form>
    </div>
</div>
{% endblock %}
