{% extends "base.html" %}

{% block title %}500 - Internal Server Error{% endblock %}

{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center" style="min-height: 70vh;">
    <h1 class="display-1 text-warning fw-bold" style="text-shadow: 0 0 20px rgba(245, 158, 11, 0.3);">500</h1>
    <h3 class="mb-4 text-primary">Internal Server Error</h3>
    <p class="text-muted text-center mb-5" style="max-width: 500px;">
        Oops, something went wrong on our end. We are working to fix the issue. Please try again later.
    </p>
    <a href="/" class="btn btn-primary px-4 py-2" style="border-radius: 50px;">
        <i class="fa-solid fa-house me-2"></i> Return Home
    </a>
</div>
{% endblock %}
