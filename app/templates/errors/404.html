{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="container d-flex flex-column justify-content-center align-items-center" style="min-height: 70vh;">
    <h1 class="display-1 text-danger fw-bold" style="text-shadow: 0 0 20px rgba(239, 68, 68, 0.3);">404</h1>
    <h3 class="mb-4 text-primary">Oops! Page not found.</h3>
    <p class="text-muted text-center mb-5" style="max-width: 500px;">
        The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.
    </p>
    <a href="/" class="btn btn-primary px-4 py-2" style="border-radius: 50px;">
        <i class="fa-solid fa-house me-2"></i> Return Home
    </a>
</div>
{% endblock %}
