services:
  # 1. Web Service (FastAPI Server + Uvicorn + Frontend SPA)
  - type: web
    name: campusmate-ai-platform
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: campusmate-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false

# 2. Managed PostgreSQL Database Instance
databases:
  - name: campusmate-db
    databaseName: campusmate_prod
    user: campusmate_admin
    plan: starter
